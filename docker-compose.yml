version: '3.8'

services:
  backend:
    build: ./src/backend
    container_name: nutrition_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/nutrition.db
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-claude-sonnet-4-20260414}
      - OPENROUTER_SITE_URL=${OPENROUTER_SITE_URL:-http://localhost:8000}
      - OPENROUTER_SITE_NAME=${OPENROUTER_SITE_NAME:-Nutrition AI Assistant}
      - OPENROUTER_TIMEOUT=${OPENROUTER_TIMEOUT:-60.0}
      - OPENROUTER_MAX_RETRIES=${OPENROUTER_MAX_RETRIES:-3}
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_WORKSPACE=${NOTION_WORKSPACE}
    networks:
      - nutrition_net

  frontend:
    build: ./src/frontend
    container_name: nutrition_frontend
    restart: unless-stopped
    ports:
      - "4000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:8000
    networks:
      - nutrition_net

networks:
  nutrition_net:
    driver: bridge

volumes:
  sqlite_data: